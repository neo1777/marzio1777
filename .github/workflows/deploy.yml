name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master # Supporta entrambi i nomi di branch storici

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Installa le dipendenze
        run: npm ci

      - name: Compila il progetto
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Prepara i file (Artefatto)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy su Pages
    steps:
      - name: Lancia il Deploy
        id: deployment
        uses: actions/deploy-pages@v4
