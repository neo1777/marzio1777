name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master # Supporta entrambi i nomi di branch storici

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Installa le dipendenze
        run: npm install

      - name: Scrivi .env.production (build-time replacement deterministico)
        # Vite con `loadEnv(mode, '.', '')` in vite.config.ts legge le env
        # da file. Le var del processo CI passate via `env:` non sempre
        # vengono iniettate in `import.meta.env.VITE_*` (dipende dal mode
        # e dal precedence ordering di Rollup `define`). Scrivere
        # esplicitamente `.env.production` rende il replacement
        # deterministico — stessa fonte sia in dev locale che in CI.
        # `.env.production` è gitignored, quindi il file vive solo
        # nel runner e viene scartato a fine job.
        run: |
          cat > .env.production <<EOF
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY=${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          EOF

      - name: Compila il progetto
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Prepara i file (Artefatto)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy su Pages
    steps:
      - name: Lancia il Deploy
        id: deployment
        uses: actions/deploy-pages@v4
